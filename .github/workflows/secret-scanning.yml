name: Secret Scanning

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.log"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.log"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run GitHub Secret Scanning
        uses: github/secret-scanning-action@v1